# Cross-venue contract registry: maps each venue's native market id to a
# shared, venue-neutral event id, so the same real-world outcome on Kalshi
# and Polymarket lands in one unified book.
#
# Identifiers (docs/api_integration.md):
#   kalshi            = Kalshi market_ticker (subscribe key)
#   polymarket_token  = Polymarket YES-outcome token id (asset_id, subscribe key)
#   polymarket_market = Polymarket condition id (0x...), for reference
#
# Ids below were pulled from both venues' public REST APIs on 2026-07-02
# (Kalshi: series KXMENWORLDCUP / KXFEDDECISION; Polymarket: gamma-api,
# sorted by 24h volume). Matching was done on the exact outcome wording.

# --- Fed decision, July 2026 meeting (macro; both venues quote the same
# outcomes: Kalshi H0 "maintains rate" = Polymarket "no change") ---

[[event]]
id = "fed-2026-07-cut-25"
description = "Fed cuts rates by 25 bps at the July 2026 meeting"
kalshi = "KXFEDDECISION-26JUL-C25"
polymarket_token = "107111506004559425167535337910569809007100298896139468418632748246491535011700"

[[event]]
id = "fed-2026-07-no-change"
description = "Fed leaves rates unchanged at the July 2026 meeting"
kalshi = "KXFEDDECISION-26JUL-H0"
polymarket_token = "111604417349377875799825956621596386269673370070912696668140891647145772186047"

