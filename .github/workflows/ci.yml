name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: End-to-end smoke (synth + replay)
        run: |
          ./build/src/basis synth demo.feedlog --steps 2000 --lead-ms 400
          ./build/src/basis replay demo.feedlog --config configs/synthetic.toml

  net-build:
    name: net build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install Boost + OpenSSL
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libboost-dev libssl-dev
          else
            brew install boost openssl@3
          fi
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBASIS_ENABLE_NET=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # macOS only: Homebrew bottles BDE; Linux has no packaged BDE and building
  # it from source is too heavy for a per-commit job.
  bde-build:
    name: bde build (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install BDE
        run: brew install bde
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBASIS_ENABLE_BDE=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Allocator smoke (arena + counting replay)
        run: |
          ./build/src/basis synth demo.feedlog --steps 2000 --lead-ms 400
          ./build/src/basis replay demo.feedlog --config configs/synthetic.toml --alloc bde
          ./build/src/basis replay demo.feedlog --config configs/synthetic.toml --alloc count

  sanitizers:
    name: ${{ matrix.san }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - san: asan-ubsan
            flags: -DBASIS_SANITIZE=ON
          - san: tsan
            flags: -DBASIS_SANITIZE_THREAD=ON
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug ${{ matrix.flags }}
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Phase 4+: once the replay bench exists, this job asserts the latency and
  # throughput numbers in docs/bench/ have not regressed. Placeholder until then.
